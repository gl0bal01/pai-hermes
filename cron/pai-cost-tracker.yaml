# Hermes cron entry — Claude usage guardrail + voice alert
# Cost: ZERO AI (reads PAI usage cache JSON)

name: pai-cost-tracker
description: Hourly check of Claude 5h/7d subscription usage. Voice-alert via Pulse if threshold exceeded.
schedule: "0 * * * *"          # hourly at :00
timezone: UTC

task:
  type: skill
  skill_name: pai-cost-tracker
  args:
    cache_path: "~/.claude/PAI/MEMORY/STATE/usage-cache.json"
    snapshot_log: "~/.hermes/state/pai-cost-snapshots.jsonl"
    thresholds:
      five_hour_warn: 60
      five_hour_alert: 80
      five_hour_block: 95
      seven_day_warn: 70
      seven_day_alert: 85
      seven_day_block: 95
      opus_7d_alert: 90
      sonnet_7d_alert: 90
      extra_credits_alert: 70
      api_spend_alert_usd: 150
    voice_alerts: true         # use pai-pulse for TTS alerts at threshold
    silent_warn: true          # warn level = log only, no voice

retries: 1
retry_delay_sec: 30
on_failure: log_only

# Voice alerts suppressed during quiet hours
quiet_hours:
  enabled: true
  start: "22:00"
  end: "07:00"

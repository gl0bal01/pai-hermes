# Hermes cron entry — upstream watcher (4 PAI repos)
# Schema: matches Hermes built-in cron scheduler format (see ~/.hermes/cron/ examples)
# Cost: ZERO AI (pure git fetch + bash regex)

name: pai-watch
description: Hourly check for upstream changes on PAI ecosystem repos. Writes JSON proposals, posts mobile alert via Pulse.
schedule: "0 * * * *"          # hourly at :00
timezone: UTC

# Hermes invokes the skill by name; skill body documents the exec path
task:
  type: skill
  skill_name: pai-watch
  args:
    sources:
      - oh-my-claudecode
      - Personal_AI_Infrastructure
      - pai-anywhere
      - pai-review-mode
    threshold: 10
    notify_on_proposal: true   # use pai-pulse skill for mobile push

# Failure handling
retries: 1
retry_delay_sec: 60
on_failure: log_only           # don't voice-alert if git fetch fails (could be flaky network)

# Quiet hours (no proposals delivered during sleep)
quiet_hours:
  enabled: false               # set true + start/end if desired
  start: "22:00"
  end: "07:00"

# Hermes cron entry — daily 18:00 mobile digest
# Cost: ZERO AI (aggregation only, +1 ElevenLabs TTS ~$0.001)

name: pai-statusline-banner
description: Daily PAI ecosystem digest pushed to mobile at 18:00 — Claude usage, proposals, doctor failures, mood, top quote.
schedule: "0 18 * * *"         # daily 18:00
timezone: UTC                  # override to local TZ in production

task:
  type: skill
  skill_name: pai-statusline-banner
  args:
    deliver_via:
      - pulse_notify           # ElevenLabs TTS + mobile push
      - telegram               # Hermes gateway to Telegram bot
    include_sections:
      - usage                  # 5h, 7d, API spend
      - ecosystem              # doctor pass/fail, proposals pending
      - leak_detector          # call-site regressions
      - algorithm_signals      # commits, skills used, mood, learning
      - quote                  # rotation from PAI canonical Quotes

retries: 1
retry_delay_sec: 60
on_failure: log_only

# Banner never silenced (it IS the daily summary — even at 18:00 quiet hours)
quiet_hours:
  enabled: false
